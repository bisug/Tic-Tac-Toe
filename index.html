<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>Tic-Tac-Toe</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Main Game Style -->
    <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>
    <!-- Full-screen background particles canvas for winning celebration -->
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-icon" aria-hidden="true">✕</span>
                <h1>Tic-Tac-Toe</h1>
                <span class="logo-icon logo-o" aria-hidden="true">◯</span>
            </div>

            <div class="header-controls">
                <!-- Sound Toggle -->
                <button id="sound-btn" type="button" class="icon-btn" aria-label="Toggle Sound Effects" title="Toggle Sound">
                    <svg class="sound-on-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                    </svg>
                    <svg class="sound-off-icon hidden" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.44 16.63,19.78 17.68,18.9L20.73,21.95L22,20.68M19,12C19,12.9 18.8,13.76 18.43,14.54L19.95,16.06C20.62,14.85 21,13.47 21,12C21,7.72 18,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,10.23 15.5,8.71 14,7.97V10.18L16.45,12.63C16.48,12.43 16.5,12.22 16.5,12Z" />
                    </svg>
                </button>
                <!-- Theme Toggle -->
                <button id="theme-btn" type="button" class="icon-btn" aria-label="Toggle Light and Dark Theme" title="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M12,18C11.11,18 10.26,17.8 9.5,17.45C11.56,16.5 13,14.42 13,12C13,9.58 11.56,7.5 9.5,6.55C10.26,6.2 11.11,6 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M20,8.69V4H15.31L12,0.69L8.69,4H4V8.69L0.69,12L4,15.31V20H8.69L12,23.31L15.31,20H20V15.31L23.31,12L20,8.69Z" />
                    </svg>
                    <svg class="moon-icon hidden" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor"
                            d="M12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M20,15.31L23.31,12L20,8.69V4H15.31L12,0.69L8.69,4H4V8.69L0.69,12L4,15.31V20H8.69L12,23.31L15.31,20H20V15.31Z" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Card Container -->
        <main class="game-card">
            <!-- Mode & Difficulty Selection -->
            <section class="game-settings">
                <div class="mode-selector" role="radiogroup" aria-label="Game Mode Selection">
                    <button id="mode-pvp" type="button" class="mode-btn active" data-mode="pvp" role="radio" aria-checked="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                            <path fill="currentColor"
                                d="M16,13C15.71,13 15.38,13 15.03,13.05C16.19,13.89 17,15 17,16.5V19H23V16.5C23,14.17 18.33,13 16,13M8,13C5.67,13 1,14.17 1,16.5V19H15V16.5C15,14.17 10.33,13 8,13M8,11A3,3 0 0,0 11,8A3,3 0 0,0 8,5A3,3 0 0,0 5,8A3,3 0 0,0 8,11M16,11A3,3 0 0,0 19,8A3,3 0 0,0 16,5A3,3 0 0,0 13,8A3,3 0 0,0 16,11Z" />
                        </svg>
                        <span>2 Players</span>
                    </button>
                    <button id="mode-pve" type="button" class="mode-btn" data-mode="pve" role="radio" aria-checked="false">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                            <path fill="currentColor"
                                d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A2,2 0 0,1 14,6A2,2 0 0,1 12,8A2,2 0 0,1 10,6A2,2 0 0,1 12,4M12,18C8.69,18 6,15.31 6,12C6,10.09 6.9,8.39 8.3,7.3L9.7,8.7C8.7,9.5 8,10.7 8,12C8,14.2 9.8,16 12,16C14.2,16 16,14.2 16,12C16,10.7 15.3,9.5 14.3,8.7L15.7,7.3C17.1,8.39 18,10.09 18,12C18,15.31 15.31,18 12,18Z" />
                        </svg>
                        <span>VS Computer</span>
                    </button>
                </div>

                <div id="difficulty-wrapper" class="difficulty-wrapper hidden">
                    <label for="difficulty-select">Difficulty:</label>
                    <div class="custom-select-container">
                        <select id="difficulty-select" aria-label="Select AI Difficulty">
                            <option value="easy">Easy (Relaxed)</option>
                            <option value="medium">Medium (Adaptive)</option>
                            <option value="impossible" selected>Impossible (Minimax)</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Scoreboard -->
            <section class="scoreboard" aria-label="Scoreboard">
                <div class="score-box player-x-score">
                    <div class="score-label">
                        <span class="symbol-dot x-dot" aria-hidden="true">✕</span>
                        <span id="player-x-name">Player 1</span>
                    </div>
                    <div id="score-x" class="score-value" aria-live="polite">0</div>
                </div>
                <div class="score-box tie-score">
                    <div class="score-label">Ties</div>
                    <div id="score-ties" class="score-value" aria-live="polite">0</div>
                </div>
                <div class="score-box player-o-score">
                    <div class="score-label">
                        <span class="symbol-dot o-dot" aria-hidden="true">◯</span>
                        <span id="player-o-name">Player 2</span>
                    </div>
                    <div id="score-o" class="score-value" aria-live="polite">0</div>
                </div>
            </section>

            <!-- Status Indicator / Turn Indicator -->
            <section class="status-container" aria-live="polite">
                <div id="status-bubble" class="status-bubble x-turn">
                    <span class="status-text">Player X's Turn</span>
                </div>
            </section>

            <!-- Game Board Wrapper -->
            <section class="board-wrapper">
                <!-- Winning line dynamic overlay -->
                <svg id="winning-line-svg" class="winning-line-svg" viewBox="0 0 300 300" pointer-events="none"
                    aria-hidden="true">
                    <line id="winning-line" x1="0" y1="0" x2="0" y2="0" stroke-linecap="round" />
                </svg>

                <!-- The 3x3 interactive board -->
                <div id="board" class="board" aria-label="Tic-Tac-Toe Board">
                    <div class="board-row">
                        <button type="button" class="cell" data-index="0" aria-label="Cell 1, Empty"></button>
                        <button type="button" class="cell" data-index="1" aria-label="Cell 2, Empty"></button>
                        <button type="button" class="cell" data-index="2" aria-label="Cell 3, Empty"></button>
                    </div>
                    <div class="board-row">
                        <button type="button" class="cell" data-index="3" aria-label="Cell 4, Empty"></button>
                        <button type="button" class="cell" data-index="4" aria-label="Cell 5, Empty"></button>
                        <button type="button" class="cell" data-index="5" aria-label="Cell 6, Empty"></button>
                    </div>
                    <div class="board-row">
                        <button type="button" class="cell" data-index="6" aria-label="Cell 7, Empty"></button>
                        <button type="button" class="cell" data-index="7" aria-label="Cell 8, Empty"></button>
                        <button type="button" class="cell" data-index="8" aria-label="Cell 9, Empty"></button>
                    </div>
                </div>
            </section>

            <!-- Action Buttons -->
            <section class="action-buttons">
                <button id="reset-board-btn" type="button" class="primary-btn ripple" aria-label="Start a new round">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor"
                            d="M19,8L15,12H18A6,6 0 0,1 12,18C11,18 10.1,17.58 9.44,16.92L8,18.36C9,19.38 10.43,20 12,20A8,8 0 0,0 20,12H23L19,8M6,12A6,6 0 0,1 12,6C13,6 13.9,6.42 14.56,7.08L16,5.64C15,4.62 13.57,4 12,4A8,8 0 0,0 4,12H1L5,16L9,12H6Z" />
                    </svg>
                    New Round
                </button>
                <button id="reset-scores-btn" type="button" class="secondary-btn ripple" aria-label="Reset all scoreboard statistics">
                    Reset Scores
                </button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <a href="https://github.com/bisug" target="_blank" class="github-credit-btn" aria-label="GitHub Profile">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path fill="currentColor"
                        d="M12,2A10,10 0 0,0 2,12C2,16.42 4.87,20.17 8.84,21.5C9.34,21.58 9.5,21.27 9.5,21C9.5,20.77 9.5,20.14 9.5,19.31C6.73,19.91 6.14,17.97 6.14,17.97C5.68,16.81 5.03,16.5 5.03,16.5C4.12,15.88 5.1,15.9 5.1,15.9C6.1,15.97 6.63,16.93 6.63,16.93C7.5,18.45 8.97,18 9.54,17.76C9.63,17.11 9.89,16.67 10.17,16.42C7.95,16.17 5.62,15.31 5.62,11.5C5.62,10.39 6,9.5 6.65,8.79C6.55,8.54 6.2,7.5 6.75,6.15C6.75,6.15 7.59,5.88 9.5,7.17C10.3,6.95 11.15,6.84 12,6.84C12.85,6.84 13.7,6.95 14.5,7.17C16.41,5.88 17.25,6.15 17.25,6.15C17.8,7.5 17.45,8.54 17.35,8.79C18,9.5 18.38,10.39 18.38,11.5C18.38,15.32 16.04,16.16 13.81,16.41C14.17,16.72 14.5,17.33 14.5,18.26C14.5,19.6 14.5,20.68 14.5,21C14.5,21.27 14.66,21.59 15.17,21.5C19.14,20.16 22,16.42 22,12A10,10 0 0,0 12,2Z" />
                </svg>
                <span>Bisu G</span>
            </a>
        </footer>
    </div>

    <!-- Announcement Modal -->
    <div id="result-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title"
        aria-describedby="modal-message">
        <div class="modal-card">
            <div class="modal-icon-wrapper" id="modal-icon-wrapper">
                <!-- SVG Icon injected dynamically -->
            </div>
            <h2 id="modal-title">Game Over</h2>
            <p id="modal-message">The round has concluded.</p>
            <button id="modal-play-again-btn" type="button" class="modal-btn ripple" aria-label="Close modal and start new round">Play
                Again</button>
        </div>
    </div>

    <!-- Main Game Script -->
    <script type="module" src="./src/js/main.js"></script>
</body>

</html>
